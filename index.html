<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="stylesheet.css">

  <title>Frontend Mentor | Product preview card component</title>


</head>
<body>

  <main>
    <div class="product-card">
      <figure>
        <img src="images/image-product-desktop.jpg" alt="perfume bottle on display" class="product-img">
        <figcaption>Perfume</figcaption>
      </figure>
      <div class="product-info">
        <h1>Gabrielle Essence Eau De Parfum</h1>

        <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>

        <div class="product-price">
          <p class="sale">$149.99</p>
          <p class="past">$169.99</p>
        </div>
        <button type="button" class="purchase">
          <img src="images/icon-cart.svg">
          Add to Cart
        </button>
      </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Leyo Outlaw</a>.
  </footer>
</body>
</html>
